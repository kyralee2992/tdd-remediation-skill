name: Security Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-tests:
    name: Exploit Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run security exploit tests
        run: go test ./security/... -v
